# DaKnowledge Configuration
# Theological Research Knowledge Base

name: DaKnowledge
version: 1.0.0
description: Research-focused theological knowledge base

# Topic Ontology
topics:
  - id: trinity
    name: Trinity
    subtopics:
      - economic-trinity
      - immanent-trinity
      - persons-of-the-trinity
      - trinitarian-hermeneutics
      
  - id: christology
    name: Christology
    subtopics:
      - hypostatic-union
      - two-natures
      - person-of-christ
      - work-of-christ
      
  - id: pneumatology
    name: Pneumatology
    subtopics:
      - person-of-the-spirit
      - work-of-the-spirit
      - spiritual-gifts
      
  - id: ecclesiology
    name: Ecclesiology
    subtopics:
      - nature-of-the-church
      - church-government
      - sacraments
      
  - id: soteriology
    name: Soteriology
    subtopics:
      - justification
      - sanctification
      - election
      - atonement
      
  - id: theology-proper
    name: Theology Proper
    subtopics:
      - attributes-of-god
      - existence-of-god
      - names-of-god
      
  - id: scripture
    name: Scripture
    subtopics:
      - biblical-theology
      - canon
      - inspiration
      - interpretation

# Source Categories
sources:
  - id: church-fathers
    name: Church Fathers
    period: 100-500 AD
    
  - id: reformers
    name: Reformers
    period: 1500-1600 AD
    
  - id: modern-scholars
    name: Modern Scholars
    period: 1800-present

# Scripture Index Settings
scripture:
  enabled: true
  canon: protestant
  auto_index: true
  
# Search Settings
search:
  full_text: true
  semantic_search: true
  scripture_citations: true
  
# Integration
integrations:
  dashboard: true
  danotify: true
  
# Privacy
privacy:
  encryption: false
  git_sync: true
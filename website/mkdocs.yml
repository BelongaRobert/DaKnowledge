site_name: DaKnowledge
site_description: Biblical Theology Knowledge Base
theme:
  name: material
  palette:
    - scheme: default
      primary: red
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: red
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Georgia
    code: Roboto Mono
extra_css:
  - stylesheets/extra.css
nav:
  - Home: index.md
  - Trinity:
    - Overview: trinity/index.md
  - Scripture:
    - Overview: scripture/index.md
  - Sacraments:
    - Overview: sacraments/index.md
  - Prayer:
    - Overview: prayer/index.md
  - Relics:
    - Overview: relics/index.md
    - Shroud of Turin: relics/shroud-of-turin.md
  - Spiritual Formation:
    - Discipleship Reflection: spiritual-formation/discipleship-reflection.md
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

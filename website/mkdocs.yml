site_name: DaKnowledge
site_description: Biblical Theology Knowledge Base
site_url: https://belongarobert.github.io/DaKnowledge/
theme:
  name: material
  palette:
    - scheme: default
      primary: red
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: red
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Georgia
    code: Roboto Mono
  logo: assets/images/banner-emmaus.jpg
  favicon: assets/images/banner-emmaus.jpg
extra_css:
  - stylesheets/extra.css
nav:
  - Home: index.md
  - Theology Proper:
    - Overview: theology-proper/index.md
    - Attributes of God: theology-proper/attributes-of-god.md
    - Names of God: theology-proper/names-of-god.md
  - The Trinity:
    - Overview: trinity/index.md
    - God the Father: trinity/the-father.md
    - God the Son: trinity/the-son.md
    - The Holy Spirit: trinity/the-holy-spirit.md
    - Economic & Immanent: trinity/economic-immanent.md
  - Christology:
    - Overview: christology/index.md
    - Hypostatic Union: christology/hypostatic-union.md
    - Two Natures: christology/two-natures.md
    - Person of Christ: christology/person-of-christ.md
    - Work of Christ: christology/work-of-christ.md
  - Pneumatology:
    - Overview: pneumatology/index.md
    - Person of the Spirit: pneumatology/person-of-the-spirit.md
    - Work of the Spirit: pneumatology/work-of-the-spirit.md
    - Spiritual Gifts: pneumatology/spiritual-gifts.md
  - Soteriology:
    - Overview: soteriology/index.md
    - Justification: soteriology/justification.md
    - Sanctification: soteriology/sanctification.md
    - Atonement: soteriology/atonement.md
    - Election: soteriology/election.md
  - Ecclesiology:
    - Overview: ecclesiology/index.md
    - Nature of the Church: ecclesiology/nature-of-the-church.md
    - Church Government: ecclesiology/church-government.md
  - Sacraments:
    - Overview: sacraments/index.md
    - Baptism: sacraments/baptism.md
    - Confirmation: sacraments/confirmation.md
    - Eucharist: sacraments/eucharist.md
    - Reconciliation: sacraments/reconciliation.md
    - Anointing of the Sick: sacraments/anointing.md
    - Holy Orders: sacraments/holy-orders.md
    - Matrimony: sacraments/matrimony.md
  - Scripture:
    - Overview: scripture/index.md
    - Biblical Inspiration: scripture/inspiration.md
    - Biblical Canon: scripture/canon.md
    - Biblical Interpretation: scripture/interpretation.md
  - Prayer:
    - Overview: prayer/index.md
    - The Lord's Prayer: prayer/lord's-prayer.md
    - Hail Mary: prayer/hail-mary.md
    - Glory Be: prayer/glory-be.md
    - Apostles' Creed: prayer/apostles-creed.md
    - Liturgical Prayer: prayer/liturgical-prayer.md
    - Personal Prayer: prayer/personal-prayer.md
    - Contemplative Prayer: prayer/contemplative-prayer.md
    - Devotional Prayer: prayer/devotional-prayer.md
  - Relics:
    - Overview: relics/index.md
    - Shroud of Turin: relics/shroud-of-turin.md
  - Spiritual Formation:
    - Discipleship Reflection: spiritual-formation/discipleship-reflection.md
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
